<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给宝贝的小游戏 💕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Arial', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
}
.container {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}
.title {
    font-size: 28px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    margin-bottom: 20px;
    text-align: center;
    padding: 0 20px;
}
.progress-wrap {
    width: 280px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px;
    margin-bottom: 20px;
    backdrop-filter: blur(4px);
}
.progress-bar {
    height: 16px;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    border-radius: 16px;
    width: 0%;
    transition: width 0.5s ease;
    position: relative;
}
.progress-text {
    position: absolute;
    right: -30px;
    top: -2px;
    font-size: 12px;
    color: #fff;
    width: 50px;
}
.score {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
}
.score span { color: #FFD700; font-weight: bold; font-size: 24px; }
.hint {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
}
.falling-item {
    position: fixed;
    z-index: 2;
    cursor: pointer;
    font-size: 30px;
    user-select: none;
    animation: fall linear forwards;
    pointer-events: auto;
    will-change: transform;
}
@keyframes fall {
    from { transform: translateY(-60px) rotate(0deg); opacity: 1; }
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
}
.collect-burst {
    position: fixed;
    z-index: 10;
    pointer-events: none;
    font-size: 24px;
    animation: burst 0.8s ease-out forwards;
}
@keyframes burst {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2) translateY(-80px); opacity: 0; }
}
.message-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
}
.message-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.message-box {
    background: #fff;
    border-radius: 20px;
    padding: 30px 25px;
    max-width: 340px;
    width: 85%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.4s ease;
}
@keyframes popIn {
    0% { transform: scale(0.8) translateY(20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}
.message-box .icon { font-size: 50px; margin-bottom: 12px; }
.message-box h3 { color: #764ba2; margin-bottom: 8px; font-size: 18px; }
.message-box p { color: #666; line-height: 1.6; font-size: 14px; margin-bottom: 16px; }
.message-box .close-btn {
    display: inline-block;
    padding: 8px 30px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
}
.message-box .close-btn:hover { transform: scale(1.05); }
.finale {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
}
.finale.show { display: flex; }
.finale-content { text-align: center; color: #fff; animation: popIn 0.6s ease; }
.finale-content .big-icon { font-size: 80px; margin-bottom: 16px; }
.finale-content h1 { font-size: 32px; margin-bottom: 12px; background: linear-gradient(90deg, #f093fb, #f5576c, #FFD700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.finale-content p { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 8px; line-height: 1.8; }
.finale-content .restart-btn {
    margin-top: 20px;
    padding: 12px 36px;
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,0.5);
    background: transparent;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
}
.finale-content .restart-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
.confetti-piece {
    position: fixed;
    z-index: 150;
    width: 10px; height: 10px;
    pointer-events: none;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(1080deg); opacity: 0; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container" id="mainContainer">
    <div class="title">❤️ 给宝贝的收集小游戏 ❤️</div>
    <div class="score">已收集 <span id="scoreNum">0</span> 颗爱心</div>
    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
            <span class="progress-text" id="progressText">0%</span>
        </div>
    </div>
    <div class="hint" id="hint">💕 点击飘落的小东西收集爱心吧~</div>
</div>
<div class="message-overlay" id="msgOverlay">
    <div class="message-box">
        <div class="icon" id="msgIcon">💖</div>
        <h3 id="msgTitle">哇！</h3>
        <p id="msgText">你发现了一颗爱心！</p>
        <button class="close-btn" onclick="closeMsg()">继续收集 ❤️</button>
    </div>
</div>
<div class="finale" id="finale">
    <div class="finale-content">
        <div class="big-icon">🎉</div>
        <h1>宝贝太棒了！</h1>
        <p>你收集了所有的爱心 ❤️</p>
        <p>想对你说：</p>
        <p style="font-size: 15px; color: rgba(255,255,255,0.9); margin-top: 10px; font-style: italic;">
            &ldquo;遇见你是我这辈子最幸运的事<br>
            每一天和你在一起都很幸福<br>
            永远爱你 ❤️&rdquo;
        </p>
        <button class="restart-btn" onclick="restartGame()">再来一次 💕</button>
    </div>
</div>
<script>
const MESSAGES = [
    { icon: '💖', title: '第一颗爱心！', text: '这是第一颗爱心，就像你第一次让我心动的那一刻 💕' },
    { icon: '💗', title: '好棒！', text: '你又发现了一颗！就像你的笑容一样温暖灿烂 🌸' },
    { icon: '💝', title: '真厉害！', text: '爱心越来越多啦～你在我心里的位置也越来越重 💓' },
    { icon: '❤️‍🔥', title: '太棒了！', text: '你是我生命中最美的风景，每一天都因为你而闪闪发光 ✨' },
    { icon: '💞', title: '超级棒！', text: '收集得真快！就像时间一样，和你在一起总是过得特别快 💫' },
    { icon: '💕', title: '加油！', text: '马上就能集满啦！你就是我的小太阳，永远暖暖的 ☀️' },
    { icon: '💘', title: '只剩最后一颗了！', text: '最后一步啦！以后的日子，我也想和你一起走完 💑' },
];
const ITEMS = ['❤️','💖','💗','💕','💞','💝','🌸','🌺','✨','🌟','⭐','🎀','💫'];
let totalItems = 28;
let collected = 0;
let msgIndex = 0;
let intervalId = null;
let fallingCount = 0;
const MAX_FALLING = 12;
function initStars() {
    const stars = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
        stars.appendChild(s);
    }
}
function spawnItem() {
    if (collected >= totalItems) return;
    if (fallingCount >= MAX_FALLING) return;
    const el = document.createElement('div');
    el.className = 'falling-item';
    el.textContent = ITEMS[Math.floor(Math.random() * ITEMS.length)];
    el.style.left = Math.random() * 85 + 5 + '%';
    el.style.fontSize = (24 + Math.random() * 20) + 'px';
    el.style.animationDuration = (5 + Math.random() * 6) + 's';
    el.style.opacity = 0.7 + Math.random() * 0.3;
    el.addEventListener('click', function(e) {
        e.stopPropagation();
        collectItem(this, e);
    });
    el.addEventListener('animationend', function() {
        if (el.parentNode) { el.remove(); fallingCount--; }
    });
    document.body.appendChild(el);
    fallingCount++;
}
function collectItem(el, event) {
    if (collected >= totalItems) return;
    const burst = document.createElement('div');
    burst.className = 'collect-burst';
    burst.textContent = '💥';
    burst.style.left = (event.clientX - 15) + 'px';
    burst.style.top = (event.clientY - 15) + 'px';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 800);
    el.remove();
    fallingCount--;
    collected++;
    document.getElementById('scoreNum').textContent = collected;
    const pct = Math.round((collected / totalItems) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = pct + '%';
    if (pct < 30) document.getElementById('hint').textContent = '💕 继续收集，更多的爱心等着你呢~';
    else if (pct < 60) document.getElementById('hint').textContent = '✨ 宝贝好厉害！已经过半了！';
    else if (pct < 90) document.getElementById('hint').textContent = '🌟 快集满了！加油加油！';
    else document.getElementById('hint').textContent = '🎯 最后一颗了！！';
    generateFast();
    if (msgIndex < MESSAGES.length) {
        const idx = Math.floor((collected - 1) / (totalItems / MESSAGES.length));
        if (idx < MESSAGES.length && collected % Math.ceil(totalItems / MESSAGES.length) === 0) {
            showMessage(MESSAGES[Math.min(idx, MESSAGES.length - 1)]);
        }
    }
    if (collected >= totalItems) { setTimeout(showFinale, 500); }
}
function generateFast() {
    clearInterval(intervalId);
    intervalId = setInterval(() => {
        if (collected < totalItems) { spawnItem(); spawnItem(); }
        else { clearInterval(intervalId); }
    }, 2000);
}
function showMessage(msg) {
    document.getElementById('msgIcon').textContent = msg.icon;
    document.getElementById('msgTitle').textContent = msg.title;
    document.getElementById('msgText').textContent = msg.text;
    document.getElementById('msgOverlay').classList.add('show');
}
function closeMsg() { document.getElementById('msgOverlay').classList.remove('show'); }
function showFinale() {
    clearInterval(intervalId);
    document.querySelectorAll('.falling-item').forEach(el => el.remove());
    document.getElementById('finale').classList.add('show');
    launchConfetti();
}
function launchConfetti() {
    const colors = ['#f093fb','#f5576c','#FFD700','#667eea','#00d2ff','#a8e063','#ff6b6b','#ffa502'];
    for (let i = 0; i < 100; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (5 + Math.random() * 10) + 'px';
        piece.style.height = (5 + Math.random() * 10) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
    }
}
function restartGame() {
    collected = 0; msgIndex = 0;
    document.getElementById('finale').classList.remove('show');
    document.getElementById('scoreNum').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '0%';
    document.getElementById('hint').textContent = '💕 点击飘落的小东西收集爱心吧~';
    document.querySelectorAll('.falling-item').forEach(el => el.remove());
    fallingCount = 0;
    clearInterval(intervalId);
    startGame();
}
function startGame() {
    for (let i = 0; i < 6; i++) setTimeout(() => spawnItem(), i * 300);
    intervalId = setInterval(() => {
        if (collected < totalItems) spawnItem();
        else clearInterval(intervalId);
    }, 1500);
}
initStars();
startGame();
</script>
</body>
</html>
